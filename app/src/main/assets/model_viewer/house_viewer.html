<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
  body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; background: #1a1a2e; }
  #info {
    position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.7); color: #fff; padding: 8px 20px; border-radius: 20px;
    font-size: 14px; pointer-events: none; z-index: 10;
    backdrop-filter: blur(4px); white-space: nowrap;
  }
  #controls {
    position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 10px; z-index: 10; flex-wrap: wrap; justify-content: center;
  }
  .btn {
    background: rgba(255,255,255,0.15); color: #fff; border: 1px solid rgba(255,255,255,0.3);
    padding: 10px 20px; border-radius: 12px; font-size: 13px; cursor: pointer;
    backdrop-filter: blur(4px); transition: all 0.3s; min-width: 90px;
    text-align: center; user-select: none; -webkit-tap-highlight-color: transparent;
  }
  .btn:hover, .btn.active { background: rgba(21,101,192,0.7); border-color: #1565C0; }
  .btn.active { background: #1565C0; }
  #loading {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    color: #fff; font-size: 18px; z-index: 20;
  }
  .spinner {
    width: 40px; height: 40px; margin: 0 auto 12px;
    border: 3px solid rgba(255,255,255,0.2); border-top-color: #fff;
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (max-width: 480px) {
    .btn { padding: 8px 14px; font-size: 12px; min-width: 70px; }
    #controls { gap: 6px; bottom: 16px; }
    #info { font-size: 12px; padding: 6px 14px; }
  }
</style>
</head>

<div id="loading"><div class="spinner"></div>Cargando modelo 3D...</div>
<div id="info">🏠 Casa Habitación — Arrastra para rotar · Pellizca para zoom</div>
<div id="controls">
  <div class="btn active" id="btnOutside" onclick="viewOutside()">🌳 Exterior</div>
  <div class="btn" id="btnInside" onclick="viewInside()">🏠 Interior</div>
  <div class="btn" id="btnTop" onclick="viewTop()">🔽 Planta</div>
  <div class="btn" id="btnReset" onclick="resetView()">🔄 Reset</div>
</div>

// ── VENTANAS (vidrio + marco) ──
function addWindow(x, y, z, w, h, rx) {
  const group = new THREE.Group();
  // Vidrio
  const glass = new THREE.Mesh(
    new THREE.PlaneGeometry(w - 0.1, h - 0.1),
    materials.window
  );
  glass.position.set(0, 0, 0);
  group.add(glass);
  // Marco
  const frameMat = materials.windowFrame;
  const fw = 0.05;
  // marcos horizontales
  const topFrame = new THREE.Mesh(new THREE.BoxGeometry(w, fw, 0.03), frameMat);
  topFrame.position.set(0, h/2, 0); group.add(topFrame);
  const botFrame = new THREE.Mesh(new THREE.BoxGeometry(w, fw, 0.03), frameMat);
  botFrame.position.set(0, -h/2, 0); group.add(botFrame);
  // verticales
  const leftFrame = new THREE.Mesh(new THREE.BoxGeometry(fw, h, 0.03), frameMat);
  leftFrame.position.set(-w/2, 0, 0); group.add(leftFrame);
  const rightFrame = new THREE.Mesh(new THREE.BoxGeometry(fw, h, 0.03), frameMat);
  rightFrame.position.set(w/2, 0, 0); group.add(rightFrame);

  group.position.set(x, y, z);
  if (rx) group.rotation.y = rx;
  return group;
}

function buildRoof() {
  const group = new THREE.Group();
  const overhang = 0.8;
  const rw = W/2 + overhang;
  const rd = D/2 + overhang;

  // Dos planos inclinados
  const roofGeom = new THREE.BufferGeometry();
  const vertices = new Float32Array([
    // Lado frontal
    -rw, H + 0.3 + roofH, rd,   // pico
    -rw - 0.5, 0.3, rd,         // alero derecho
    rw + 0.5, 0.3, rd,          // alero izquierdo

    // Lado trasero
    -rw, H + 0.3 + roofH, -rd,
    -rw - 0.5, 0.3, -rd,
    rw + 0.5, 0.3, -rd,

    // Laterales (triángulos)
    -rw, H + 0.3 + roofH, rd,
    -rw, H + 0.3 + roofH, -rd,
    -rw - 0.5, 0.3, rd,
  ]);
  // Esto es complejo, mejor usar planos inclinados simples
  // Limpiar y usar approach más simple
  return group;
}

// ── Funciones de cámara ──
function animateCamera(targetPos, targetLook) {
  const start = { x: camera.position.x, y: camera.position.y, z: camera.position.z };
  const startTarget = { x: controls.target.x, y: controls.target.y, z: controls.target.z };
  const duration = 1000;
  const startTime = Date.now();

  function update() {
    const elapsed = Date.now() - startTime;
    const t = Math.min(elapsed / duration, 1);
    // Ease in-out
    const ease = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;

    camera.position.set(
      start.x + (targetPos.x - start.x) * ease,
      start.y + (targetPos.y - start.y) * ease,
      start.z + (targetPos.z - start.z) * ease
    );
    controls.target.set(
      startTarget.x + (targetLook.x - startTarget.x) * ease,
      startTarget.y + (targetLook.y - startTarget.y) * ease,
      startTarget.z + (targetLook.z - startTarget.z) * ease
    );
    controls.update();

    if (t < 1) requestAnimationFrame(update);
  }
  update();
}

window.resetView = function() {
  document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btnOutside').classList.add('active');
  sectionPlane.visible = false;
  animateCamera(
    { x: 12, y: 8, z: 12 },
    { x: 0, y: 2, z: 0 }
  );
};

// Vista inicial
viewOutside();

// ── Touch support ──
renderer.domElement.addEventListener('touchstart', (e) => {
  if (e.touches.length === 1) controls.enableRotate = true;
});
</script>
